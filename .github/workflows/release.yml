name: Build & Release

on:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Determine version
        id: version
        shell: powershell
        run: |
          $count = (git tag -l "v*" | Measure-Object).Count
          $ver = "v0.1.$count"
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Inject version
        shell: powershell
        run: |
          Set-Content version.py "__version__ = '${{ steps.version.outputs.VERSION }}'"

      - name: Build executable
        shell: powershell
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "BlackFlagModManager" `
            --icon "assets/icon.ico" `
            --add-data "assets;assets" `
            --add-data "tools/repak;tools/repak" `
            --add-data "tools/retoc;tools/retoc" `
            --add-data "tools/extracted;tools/extracted" `
            --add-data "tools/extracted_mineral;tools/extracted_mineral" `
            --add-data "tools/extracted_tree;tools/extracted_tree" `
            --add-data "tools/extracted_backpack;tools/extracted_backpack" `
            --add-data "tools/extracted_fasttravel;tools/extracted_fasttravel" `
            --add-data "tools/extracted_lantern;tools/extracted_lantern" `
            --add-data "tools/extracted_vanilla;tools/extracted_vanilla" `
            --add-data "tools/extracted_allloot;tools/extracted_allloot" `
            --add-data "tools/extracted_segments;tools/extracted_segments" `
            --hidden-import customtkinter `
            main.py

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: powershell
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          gh release create $ver dist/BlackFlagModManager.exe `
            --title "BlackFlag Mod Manager $ver" `
            --generate-notes `
            --target master
